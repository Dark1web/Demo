version: '3.8'

services:
  # Python FastAPI Service
  python-api:
    build:
      context: ./python-api
      dockerfile: Dockerfile
    container_name: aegis-python-api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      - ./python-api:/app
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aegis-network

  # Node.js Data Pipeline Service
  node-pipeline:
    build:
      context: ./node-data-pipeline
      dockerfile: Dockerfile
    container_name: aegis-node-pipeline
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - PYTHON_API_URL=http://python-api:8000
    env_file:
      - .env
    volumes:
      - ./node-data-pipeline:/app
      - ./logs:/app/logs
    depends_on:
      - python-api
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aegis-network

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - aegis-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: aegis-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs:/var/log/nginx
    depends_on:
      - python-api
      - node-pipeline
    restart: unless-stopped
    networks:
      - aegis-network

  # Monitoring with Prometheus (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: aegis-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped
    networks:
      - aegis-network

  # Grafana for monitoring dashboards (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: aegis-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - aegis-network

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  aegis-network:
    driver: bridge